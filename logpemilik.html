<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Pemilik</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-0 min-h-screen flex flex-col items-center gap-[25px] font-sans 
bg-[linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),url('anyam.png')] 
bg-cover bg-center">

<!-- JS tetap -->
<script src="logpemilik.js"></script>
<script src="/function/sessionjsonwebtoken.js"></script>

<!-- Navbar -->
<header class="w-full bg-[#1e1e1e] flex justify-between items-center px-[30px] py-[20px] border-b-[3px] border-[#2e7d32]">
  <div class="text-[#2e7d32] text-[24px] font-bold">Website PandCraft</div>
</header>

<!-- Judul -->
<h2 class="text-white text-[32px] [text-shadow:0_0_10px_rgba(0,0,0,0.6)]">
  Masukkan Nama dan Password
</h2>

<!-- Box Login -->
<div class="bg-white px-[35px] py-[30px] w-[320px] rounded-[14px] shadow-[0_8px_20px_rgba(0,0,0,0.2)] mb-auto">

  <form onsubmit="return loginValidate()">

    <!-- Nama -->
    <div class="flex flex-col mb-[18px] text-left">
      <label class="text-[14px] mb-[6px] font-bold text-[#333]">Nama</label>
      <input type="text" id="nama" placeholder="Masukkan nama" required
        class="px-[12px] py-[10px] rounded-[8px] border border-[#ccc] text-[14px] focus:outline-none focus:border-[#2e7d32]">
    </div>

    <!-- Password -->
    <div class="flex flex-col mb-[18px] text-left">
      <label class="text-[14px] mb-[6px] font-bold text-[#333]">Password</label>
      <input type="password" id="password" placeholder="Masukkan password" required
        class="px-[12px] py-[10px] rounded-[8px] border border-[#ccc] text-[14px] focus:outline-none focus:border-[#2e7d32]">
    </div>

    <!-- Button Login -->
    <button type="submit"
      class="w-full py-[12px] border-none rounded-[10px] bg-[#2e7d32] text-white text-[16px] font-bold cursor-pointer hover:bg-[#256628]">
      Login
    </button>

  </form>
</div>

<!-- Tombol Kembali -->
<a href="beranda.html"
  class="fixed top-[100px] right-[30px] bg-[rgba(46,125,50,0.9)] text-white px-[18px] py-[10px] rounded-[20px] no-underline text-[14px] font-bold shadow-[0_4px_10px_rgba(0,0,0,0.2)] transition duration-300 z-10 hover:bg-[#256628] hover:-translate-y-[2px]">
  ← Kembali
</a>

<!-- JS tetap -->
<script src="logpemilik.js"></script>
<script src="/function/sessionjsonwebtoken.js"></script>

</body>
</html>
