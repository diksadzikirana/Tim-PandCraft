<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pemilik</title>
    <link rel="stylesheet" href="logpemilik.css">
</head>
<body>
<script src="logpemilik.js"></script>
<header class="navbar">
  <div class="logo">Website PandCraft</div>
</header>


<h2 class="login-title">Masukkan Nama dan Password</h2>


<div class="login-container">
  <form onsubmit="return loginValidate()">
   
    <div class="form-group">
      <label>Nama</label>
      <input type="text" id="nama" placeholder="Masukkan nama" required>
    </div>


    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Masukkan password" required>
    </div>


    <button type="submit" class="btn-login">Login</button>
    <a href="beranda.html" class="btn-back">← Kembali</a>


  </form>
</div>




</body>
</html>
