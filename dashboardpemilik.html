<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Pemilik</title>
    <link rel="stylesheet" href="dashboardpemilik.css">
    <script src="function/validatetoken.js"></script>
</head>
<body>

    <h1 class="title">Dashboard Pemilik</h1>

    <button onclick="logout()" class="btn-back">Logout</button>

    <p>Silahkan Pilih Menu Untuk Mengelola Produk Anda</p>

    <hr>

    <h2>Menu Utama</h2>

    <div class="menu">
        <a href="kelola_produk.html"><button>Kelola Produk</button></a>
        <a href="kelola_pesanan.html"><button>Kelola Pesanan</button></a>
        <a href="kelola_pembayaran.html"><button>Kelola Pembayaran</button></a>
        <a href="riwayat_penjualan.html"><button>Riwayat Penjualan</button></a>
    </div>

    <!-- VALIDASI TOKEN -->
    <script>
    const session = getValidSession();

    if (!session) {
        alert("Session habis / belum login!");
        window.location.href = "logpemilik.html";
    } else {
        console.log("Login sebagai:", session.data.user);
    }
</script>
    <script>
function logout() {
    // Hapus token dari localStorage
    localStorage.removeItem("token");

    alert("Logout berhasil!");

    // Arahkan ke halaman login
    window.location.href = "logpemilik.html";
}
</script>
</body>
</html>
